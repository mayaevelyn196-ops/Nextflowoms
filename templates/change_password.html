<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexFlow OMS - Change Password</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 2rem;
            padding: 2.5rem;
            width: 100%;
            max-width: 440px;
            box-shadow: 
                0 25px 50px -12px rgba(0, 0, 0, 0.25),
                0 0 0 1px rgba(255, 255, 255, 0.1) inset;
            animation: slideUp 0.5s ease-out;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .saas-input {
            width: 100%;
            padding: 0.875rem 1rem;
            border: 1.5px solid #e2e8f0;
            border-radius: 12px;
            font-size: 0.95rem;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            background: #ffffff;
            color: #1e293b;
            outline: none;
        }
        
        .saas-input:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }
        
        .saas-input::placeholder {
            color: #94a3b8;
        }

        .saas-input.error {
            border-color: #ef4444;
            box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.1);
        }
        
        .btn-primary {
            width: 100%;
            padding: 0.875rem;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            position: relative;
            overflow: hidden;
        }
        
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.3);
        }
        
        .btn-primary:active:not(:disabled) {
            transform: translateY(0);
        }
        
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .btn-primary.is-loading .btn-text {
            opacity: 0;
        }
        
        .btn-primary .spinner {
            position: absolute;
            opacity: 0;
            transition: opacity 0.2s;
        }
        
        .btn-primary.is-loading .spinner {
            opacity: 1;
        }
        
        .mini-spin {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-right-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-box {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #dc2626;
            padding: 0.75rem 1rem;
            border-radius: 12px;
            margin-bottom: 1.25rem;
            font-size: 0.875rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            animation: shake 0.5s ease-in-out;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            15% { transform: translateX(-6px); }
            30% { transform: translateX(6px); }
            45% { transform: translateX(-3px); }
            60% { transform: translateX(3px); }
            75% { transform: translateX(-1px); }
        }

        .success-box {
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            color: #16a34a;
            padding: 0.75rem 1rem;
            border-radius: 12px;
            margin-bottom: 1.25rem;
            font-size: 0.875rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .password-strength {
            height: 4px;
            border-radius: 2px;
            margin-top: 0.5rem;
            transition: all 0.3s ease;
            background: #e2e8f0;
        }
        
        .password-strength-bar {
            height: 100%;
            border-radius: 2px;
            transition: all 0.3s ease;
        }
        
        .strength-weak { width: 25%; background: #ef4444; }
        .strength-fair { width: 50%; background: #f59e0b; }
        .strength-good { width: 75%; background: #8b5cf6; }
        .strength-strong { width: 100%; background: #10b981; }

        .requirement-list {
            margin-top: 0.5rem;
            font-size: 0.75rem;
            color: #64748b;
        }
        
        .requirement-item {
            display: flex;
            align-items: center;
            gap: 0.375rem;
            margin-bottom: 0.25rem;
        }
        
        .requirement-item.met {
            color: #10b981;
        }
        
        .requirement-item i {
            font-size: 0.625rem;
            width: 14px;
            text-align: center;
        }

        .icon-container {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, #f59e0b, #d97706);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            box-shadow: 0 10px 25px rgba(245, 158, 11, 0.3);
        }

        .icon-container i {
            color: white;
            width: 28px;
            height: 28px;
        }

        .title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1e293b;
            text-align: center;
            margin: 0 0 0.5rem 0;
        }

        .subtitle {
            color: #64748b;
            text-align: center;
            margin: 0 0 2rem 0;
            font-size: 0.875rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-label {
            font-size: 0.6875rem;
            font-weight: 600;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            display: block;
            margin-bottom: 0.375rem;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 1.5rem;
            color: #6366f1;
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 500;
            transition: color 0.2s;
        }
        
        .back-link:hover {
            color: #4f46e5;
        }

        @media (max-width: 480px) {
            .glass-card {
                padding: 2rem 1.5rem;
                border-radius: 1.5rem;
            }
            .title {
                font-size: 1.25rem;
            }
        }
    </style>
</head>
<body>
    <div class="glass-card">
        <div class="icon-container">
            <i data-lucide="key-round"></i>
        </div>
        
        <h1 class="title">Change Password</h1>
        <p class="subtitle">Please set a new secure password for your account</p>
        
        {% if error %}
        <div class="error-box" id="server-error">
            <i data-lucide="alert-triangle" style="width: 18px; height: 18px; flex-shrink: 0;"></i>
            <span>{{ error }}</span>
        </div>
        {% endif %}
        
        <div class="error-box" id="dynamic-error" style="display: none;">
            <i data-lucide="alert-triangle" style="width: 18px; height: 18px; flex-shrink: 0;"></i>
            <span id="dynamic-error-text"></span>
        </div>
        
        <div class="success-box" id="success-box" style="display: none;">
            <i data-lucide="check-circle" style="width: 18px; height: 18px; flex-shrink: 0;"></i>
            <span id="success-text"></span>
        </div>
        
        <form method="POST" action="/change-password" id="change-password-form" autocomplete="off">
            <div class="form-group">
                <label class="form-label" for="current-password">Current Password</label>
                <input 
                    type="password" 
                    name="current_password" 
                    id="current-password" 
                    required 
                    class="saas-input" 
                    placeholder="Enter your current password"
                    autocomplete="current-password"
                >
            </div>
            
            <div class="form-group">
                <label class="form-label" for="new-password">New Password</label>
                <input 
                    type="password" 
                    name="new_password" 
                    id="new-password" 
                    required 
                    class="saas-input" 
                    placeholder="Enter new password (min 8 characters)"
                    autocomplete="new-password"
                >
                
                <div class="password-strength" id="password-strength" style="display: none;">
                    <div class="password-strength-bar" id="password-strength-bar"></div>
                </div>
                
                <div class="requirement-list" id="requirement-list" style="display: none;">
                    <div class="requirement-item" id="req-length">
                        <i data-lucide="circle"></i> At least 8 characters
                    </div>
                    <div class="requirement-item" id="req-uppercase">
                        <i data-lucide="circle"></i> At least one uppercase letter
                    </div>
                    <div class="requirement-item" id="req-lowercase">
                        <i data-lucide="circle"></i> At least one lowercase letter
                    </div>
                    <div class="requirement-item" id="req-number">
                        <i data-lucide="circle"></i> At least one number
                    </div>
                </div>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="confirm-password">Confirm New Password</label>
                <input 
                    type="password" 
                    name="confirm_password" 
                    id="confirm-password" 
                    required 
                    class="saas-input" 
                    placeholder="Re-enter new password"
                    autocomplete="new-password"
                >
                <div id="match-indicator" style="display: none; margin-top: 0.375rem; font-size: 0.75rem;"></div>
            </div>
            
            <button type="submit" class="btn-primary" id="submit-btn">
                <span class="btn-text" style="display: flex; align-items: center; gap: 0.5rem;">
                    <i data-lucide="check"></i>
                    Update Password
                </span>
                <span class="spinner">
                    <div class="mini-spin"></div>
                </span>
            </button>
        </form>
        
        <a href="/" class="back-link">← Back to Dashboard</a>
    </div>
    
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        lucide.createIcons();
        
        const form = document.getElementById('change-password-form');
        const currentPasswordInput = document.getElementById('current-password');
        const newPasswordInput = document.getElementById('new-password');
        const confirmPasswordInput = document.getElementById('confirm-password');
        const submitBtn = document.getElementById('submit-btn');
        const dynamicError = document.getElementById('dynamic-error');
        const dynamicErrorText = document.getElementById('dynamic-error-text');
        const successBox = document.getElementById('success-box');
        const successText = document.getElementById('success-text');
        const passwordStrength = document.getElementById('password-strength');
        const passwordStrengthBar = document.getElementById('password-strength-bar');
        const requirementList = document.getElementById('requirement-list');
        const matchIndicator = document.getElementById('match-indicator');
        
        function showError(message) {
            dynamicError.style.display = 'flex';
            dynamicErrorText.textContent = message;
            successBox.style.display = 'none';
            dynamicError.style.animation = 'none';
            dynamicError.offsetHeight;
            dynamicError.style.animation = 'shake 0.5s ease-in-out';
            setTimeout(() => { dynamicError.style.display = 'none'; }, 5000);
        }
        
        function showSuccess(message) {
            successBox.style.display = 'flex';
            successText.textContent = message;
            dynamicError.style.display = 'none';
        }
        
        function checkPasswordStrength(password) {
            let strength = 0;
            if (password.length >= 8) strength++;
            if (/[A-Z]/.test(password)) strength++;
            if (/[a-z]/.test(password)) strength++;
            if (/\d/.test(password)) strength++;
            return strength;
        }
        
        function updatePasswordStrengthUI(password) {
            if (password.length === 0) {
                passwordStrength.style.display = 'none';
                requirementList.style.display = 'none';
                return;
            }
            
            passwordStrength.style.display = 'block';
            requirementList.style.display = 'block';
            
            const strength = checkPasswordStrength(password);
            
            passwordStrengthBar.className = 'password-strength-bar';
            if (strength === 0 || strength === 1) {
                passwordStrengthBar.classList.add('strength-weak');
            } else if (strength === 2) {
                passwordStrengthBar.classList.add('strength-fair');
            } else if (strength === 3) {
                passwordStrengthBar.classList.add('strength-good');
            } else if (strength === 4) {
                passwordStrengthBar.classList.add('strength-strong');
            }
            
            const reqLength = document.getElementById('req-length');
            const reqUppercase = document.getElementById('req-uppercase');
            const reqLowercase = document.getElementById('req-lowercase');
            const reqNumber = document.getElementById('req-number');
            
            if (password.length >= 8) {
                reqLength.classList.add('met');
                reqLength.querySelector('i').setAttribute('data-lucide', 'check-circle');
            } else {
                reqLength.classList.remove('met');
                reqLength.querySelector('i').setAttribute('data-lucide', 'circle');
            }
            
            if (/[A-Z]/.test(password)) {
                reqUppercase.classList.add('met');
                reqUppercase.querySelector('i').setAttribute('data-lucide', 'check-circle');
            } else {
                reqUppercase.classList.remove('met');
                reqUppercase.querySelector('i').setAttribute('data-lucide', 'circle');
            }
            
            if (/[a-z]/.test(password)) {
                reqLowercase.classList.add('met');
                reqLowercase.querySelector('i').setAttribute('data-lucide', 'check-circle');
            } else {
                reqLowercase.classList.remove('met');
                reqLowercase.querySelector('i').setAttribute('data-lucide', 'circle');
            }
            
            if (/\d/.test(password)) {
                reqNumber.classList.add('met');
                reqNumber.querySelector('i').setAttribute('data-lucide', 'check-circle');
            } else {
                reqNumber.classList.remove('met');
                reqNumber.querySelector('i').setAttribute('data-lucide', 'circle');
            }
            
            lucide.createIcons({
                attrs: { width: 12, height: 12 },
                elements: document.querySelectorAll('.requirement-item i')
            });
        }
        
        function checkPasswordMatch() {
            const newPass = newPasswordInput.value;
            const confirmPass = confirmPasswordInput.value;
            
            if (confirmPass.length === 0) {
                matchIndicator.style.display = 'none';
                return;
            }
            
            matchIndicator.style.display = 'block';
            
            if (newPass === confirmPass) {
                matchIndicator.innerHTML = '✓ Passwords match';
                matchIndicator.style.color = '#10b981';
                confirmPasswordInput.classList.remove('error');
            } else {
                matchIndicator.innerHTML = '✗ Passwords do not match';
                matchIndicator.style.color = '#ef4444';
                confirmPasswordInput.classList.add('error');
            }
        }
        
        newPasswordInput.addEventListener('input', function() {
            const password = this.value;
            updatePasswordStrengthUI(password);
            checkPasswordMatch();
        });
        
        confirmPasswordInput.addEventListener('input', function() {
            checkPasswordMatch();
        });
        
        form.addEventListener('submit', function(e) {
            const currentPass = currentPasswordInput.value.trim();
            const newPass = newPasswordInput.value.trim();
            const confirmPass = confirmPasswordInput.value.trim();
            
            dynamicError.style.display = 'none';
            successBox.style.display = 'none';
            currentPasswordInput.classList.remove('error');
            newPasswordInput.classList.remove('error');
            confirmPasswordInput.classList.remove('error');
            
            if (!currentPass) {
                e.preventDefault();
                showError('Please enter your current password.');
                currentPasswordInput.classList.add('error');
                currentPasswordInput.focus();
                return;
            }
            
            if (!newPass) {
                e.preventDefault();
                showError('Please enter a new password.');
                newPasswordInput.classList.add('error');
                newPasswordInput.focus();
                return;
            }
            
            if (newPass.length < 8) {
                e.preventDefault();
                showError('Password must be at least 8 characters long.');
                newPasswordInput.classList.add('error');
                newPasswordInput.focus();
                return;
            }
            
            if (!/[A-Z]/.test(newPass)) {
                e.preventDefault();
                showError('Password must contain at least one uppercase letter.');
                newPasswordInput.classList.add('error');
                newPasswordInput.focus();
                return;
            }
            
            if (!/[a-z]/.test(newPass)) {
                e.preventDefault();
                showError('Password must contain at least one lowercase letter.');
                newPasswordInput.classList.add('error');
                newPasswordInput.focus();
                return;
            }
            
            if (!/\d/.test(newPass)) {
                e.preventDefault();
                showError('Password must contain at least one number.');
                newPasswordInput.classList.add('error');
                newPasswordInput.focus();
                return;
            }
            
            if (!confirmPass) {
                e.preventDefault();
                showError('Please confirm your new password.');
                confirmPasswordInput.classList.add('error');
                confirmPasswordInput.focus();
                return;
            }
            
            if (newPass !== confirmPass) {
                e.preventDefault();
                showError('Passwords do not match. Please try again.');
                confirmPasswordInput.classList.add('error');
                confirmPasswordInput.focus();
                return;
            }
            
            if (newPass === currentPass) {
                e.preventDefault();
                showError('New password must be different from your current password.');
                newPasswordInput.classList.add('error');
                newPasswordInput.focus();
                return;
            }
            
            submitBtn.classList.add('is-loading');
            submitBtn.disabled = true;
        });
        
        currentPasswordInput.addEventListener('input', function() {
            this.classList.remove('error');
            dynamicError.style.display = 'none';
        });
        
        newPasswordInput.addEventListener('input', function() {
            this.classList.remove('error');
            dynamicError.style.display = 'none';
        });
        
        confirmPasswordInput.addEventListener('input', function() {
            this.classList.remove('error');
            dynamicError.style.display = 'none';
        });
        
        setTimeout(() => {
            currentPasswordInput.focus();
        }, 500);
        
        currentPasswordInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                newPasswordInput.focus();
            }
        });
        
        newPasswordInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                confirmPasswordInput.focus();
            }
        });
        
        confirmPasswordInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                form.dispatchEvent(new Event('submit'));
            }
        });
    </script>
</body>
</html>
